<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Library UI</title>
    <link rel="stylesheet" href="../css/library.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

<nav class="navbar">

   <div class="left-half">
       <a href="index.html" class="logo-link">
          <div class="logo-box">
             <img src="images/logo_no_bg - Edited.png" alt="logo">
          </div>
      </a>
  </div>

    <div class="right-half">

        <div class="search-icon" onclick="openSearch()">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>

       <div class="explore-icon" onclick="openExplore()">
            <i class="fa-solid fa-compass"></i>
       </div>

       <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search songs, artists...">
       </div>

        <button onclick="window.location.href='#'" class="signup-btn">Sign Up</button>
        <button onclick="window.location.href='#'" class="login-btn">Sign in</button>

    </div>

</nav>
    <div class="container">
        <aside class="sidebar">
            <nav>
                <div class="nav-item"><i class="ph ph-house"></i> Home</div>
                <div class="nav-item"><i class="ph ph-magnifying-glass"></i> Explore</div>
                <div class="nav-item active"><i class="ph ph-books"></i> Library</div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="search-box">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" placeholder="Search songs, artists...">
                </div>
                <div class="user-profile"><i class="ph ph-user-circle"></i></div>
            </header>

            <section class="library-section">
                <h1>Your Library</h1>
                <h3>My Playlists</h3>
                <div class="playlist-grid">
                    <div class="playlist-card new-playlist">
                        <div class="plus-icon"><i class="ph ph-plus"></i></div>
                        <p>New Playlist</p>
                    </div>
                    <div class="playlist-card chill">Morning Chill <small>5 Songs</small></div>
                    <div class="playlist-card workout">Workout Energy <small>15 Songs</small></div>
                    <div class="playlist-card focus">Deep Focus <small>18 Songs</small></div>
                    <div class="playlist-card jazz">Midnight Jazz <small>10 Songs</small></div>
                </div>
            </section>

            <section class="recently-played">
                <h3>Recently Played</h3>
                <table class="song-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>TITLE</th>
                            <th>ALBUM</th>
                            <th>DATE ADDED</th>
                            <th><i class="ph ph-clock"></i></th>
                        </tr>
                    </thead>
                    <tbody id="song-list">
                        </tbody>
                </table>
            </section>
        </main>

        <footer class="player-bar">
            <div class="current-song">
                <div class="song-thumb"></div>
                <div class="song-info">
                    <span class="song-name">Summer Breeze</span>
                    <span class="artist-name">Chill Vibes Artist</span>
                </div>
            </div>
            <div class="player-controls">
                <i class="ph ph-skip-back-fill"></i>
                <div class="play-btn"><i class="ph ph-play-fill"></i></div>
                <i class="ph ph-skip-forward-fill"></i>
            </div>
            <div class="volume-control">
                <i class="ph ph-speaker-high"></i>
                <div class="vol-slider"></div>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
    <script>
    
    const songs = [
        { id: 1, title: "Midnight City", artist: "M83", album: "Hurry Up, We're Dreaming", date: "2 days ago", time: "4:03" },
        { id: 2, title: "Levitating", artist: "Dua Lipa", album: "Future Nostalgia", date: "3 days ago", time: "3:23" },
        { id: 3, title: "Blinding Lights", artist: "The Weeknd", album: "After Hours", date: "5 days ago", time: "3:20" },
        { id: 4, title: "Sunflower", artist: "Post Malone & Swae Lee", album: "Hollywood's Bleeding", date: "1 week ago", time: "2:38" }
    ];

    
    const songContainer = document.getElementById('song-list');

    
    if (songContainer) {
        songContainer.innerHTML = songs.map(song => `
            <tr>
                <td>${song.id}</td>
                <td>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div style="width: 40px; height: 40px; background: #333; border-radius: 4px;"></div>
                        <div>
                            <div style="font-weight: bold; color: white;">${song.title}</div>
                            <div style="font-size: 12px; color: #b3b3b3;">${song.artist}</div>
                        </div>
                    </div>
                </td>
                <td>${song.album}</td>
                <td>${song.date}</td>
                <td>${song.time}</td>
            </tr>
        `).join('');
    }
</script>
</body>
</html>
