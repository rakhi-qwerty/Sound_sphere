<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library – SoundSphere</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/library.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="left-half">
    <a href="../index.html" class="logo-link">
      <div class="logo-box">
        <img src="/images/logo_no_bg - Edited.png" alt="SoundSphere">
      </div>
    </a>
  </div>
  <div class="right-half">
    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="searchInput" placeholder="Search songs, artists..." onkeydown="handleSearch(event)">
    </div>
    <div id="authButtons">
      <button onclick="window.location.href='/html/signup.html'" class="signup-btn">Sign Up</button>
      <button onclick="window.location.href='/html/signin.html'" class="login-btn">Sign in</button>
    </div>
    <div id="userMenu" style="display:none; align-items:center; gap:8px;">
      <span id="userName" style="color:#fff; font-size:14px;"></span>
      <button onclick="logout()" class="login-btn" style="color:#f87171;">Logout</button>
    </div>
  </div>
</nav>

<div class="lib-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <nav>
      <div class="nav-item" onclick="window.location.href='/'">
        <i class="fa-solid fa-house"></i> Home
      </div>
      <div class="nav-item" onclick="window.location.href='/html/search.html'">
        <i class="fa-solid fa-magnifying-glass"></i> Search
      </div>
      <div class="nav-item active">
        <i class="fa-solid fa-book"></i> Library
      </div>
      <div class="nav-item" onclick="window.location.href='/html/profile.html'">
        <i class="fa-solid fa-user"></i> Profile
      </div>
    </nav>
    <div class="sidebar-playlists">
      <h4>Your Playlists</h4>
      <div id="sidebarPlaylists"></div>
      <button class="new-playlist-btn" onclick="createPlaylist()">
        <i class="fa-solid fa-plus"></i> New Playlist
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">

    <!-- LIKED SONGS -->
    <section class="lib-section">
      <h2><i class="fa-solid fa-heart" style="color:#f87171"></i> Liked Songs</h2>
      <div id="likedSongs">
        <p class="empty-msg">Sign in to see your liked songs.</p>
      </div>
    </section>

    <!-- PLAYLISTS -->
    <section class="lib-section">
      <h2><i class="fa-solid fa-list"></i> My Playlists</h2>
      <div id="playlistsGrid" class="playlist-grid"></div>
    </section>

  </main>
</div>

<!-- MUSIC PLAYER BAR -->
<div class="player-bar" id="playerBar" style="display:none;">
  <div class="player-left" onclick="openFullPlayer()" style="cursor:pointer;">
    <img id="playerImg" src="" alt="cover">
    <div class="player-info">
      <span id="playerTitle">-</span>
      <span id="playerArtist">-</span>
    </div>
    <button class="like-btn" id="likeBtn" onclick="event.stopPropagation(); toggleLike()" title="Like">
      <i class="fa-regular fa-heart"></i>
    </button>
  </div>
  <div class="player-center">
    <button id="barShuffleBtn" onclick="toggleShuffle()" title="Shuffle"><i class="fa-solid fa-shuffle"></i></button>
    <button onclick="prevSong()"><i class="fa-solid fa-backward-step"></i></button>
    <button class="play-pause-btn" id="playPauseBtn" onclick="togglePlay()">
      <i class="fa-solid fa-play"></i>
    </button>
    <button onclick="nextSong()"><i class="fa-solid fa-forward-step"></i></button>
    <button id="barRepeatBtn" onclick="toggleRepeat()" title="Repeat"><i class="fa-solid fa-repeat"></i></button>
    <div class="progress-wrap">
      <span id="currentTime">0:00</span>
      <input type="range" id="progressBar" value="0" min="0" max="100" oninput="seekTo(this.value)">
      <span id="totalTime">0:00</span>
    </div>
  </div>
  <div class="player-right">
    <button onclick="openFullPlayer()" title="Expand"><i class="fa-solid fa-up-right-and-down-left-from-center"></i></button>
    <i class="fa-solid fa-volume-high"></i>
    <input type="range" id="volumeBar" value="80" min="0" max="100" oninput="setVolume(this.value)">
  </div>
</div>

<!-- FULL-SCREEN PLAYER -->
<div id="fullPlayer" class="full-player" style="display:none;">
  <button class="fp-close" onclick="closeFullPlayer()"><i class="fa-solid fa-chevron-down"></i></button>
  <div class="fp-bg" id="fpBg"></div>
  <div class="fp-content">
    <img id="fpImg" src="" alt="cover" class="fp-cover">
    <div class="fp-meta">
      <div>
        <div id="fpTitle" class="fp-title">-</div>
        <div id="fpArtist" class="fp-artist">-</div>
      </div>
      <button class="like-btn" id="fpLikeBtn" onclick="toggleLike()"><i class="fa-regular fa-heart"></i></button>
    </div>
    <div class="fp-progress">
      <input type="range" id="fpProgressBar" value="0" min="0" max="100" oninput="seekTo(this.value)">
      <div class="fp-times"><span id="fpCurrentTime">0:00</span><span id="fpTotalTime">0:00</span></div>
    </div>
    <div class="fp-controls">
      <button id="shuffleBtn" onclick="toggleShuffle()"><i class="fa-solid fa-shuffle"></i></button>
      <button onclick="prevSong()"><i class="fa-solid fa-backward-step"></i></button>
      <button class="fp-play-btn" id="fpPlayBtn" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button>
      <button onclick="nextSong()"><i class="fa-solid fa-forward-step"></i></button>
      <button id="repeatBtn" onclick="toggleRepeat()"><i class="fa-solid fa-repeat"></i></button>
    </div>
    <div class="fp-extras">
      <button onclick="toggleQueue()"><i class="fa-solid fa-list"></i> Queue</button>
      <button onclick="toggleLyrics()"><i class="fa-solid fa-microphone-lines"></i> Lyrics</button>
      <div class="fp-volume">
        <i class="fa-solid fa-volume-high"></i>
        <input type="range" id="fpVolume" value="80" min="0" max="100" oninput="setVolume(this.value)">
      </div>
    </div>
    <div id="lyricsPanel" class="lyrics-panel" style="display:none;">
      <h3><i class="fa-solid fa-microphone-lines"></i> Lyrics</h3>
      <div id="lyricsContent" class="lyrics-content">Fetching lyrics...</div>
    </div>
    <div id="queuePanel" class="queue-panel" style="display:none;">
      <h3><i class="fa-solid fa-list"></i> Up Next</h3>
      <div id="queueList"></div>
    </div>
  </div>
</div>

<script src="/js/player.js"></script>
<script>
const API = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';

function getToken() { return localStorage.getItem('ss_token'); }
function getUser()  { return JSON.parse(localStorage.getItem('ss_user') || 'null'); }
function logout()   { localStorage.removeItem('ss_token'); localStorage.removeItem('ss_user'); window.location.reload(); }

// ── AUTH UI ──────────────────────────────────────────────────
function updateAuthUI() {
  const user = getUser();
  const authButtons = document.getElementById('authButtons');
  const userMenu    = document.getElementById('userMenu');
  const userName    = document.getElementById('userName');
  if (user) {
    authButtons.style.display = 'none';
    userMenu.style.display    = 'flex';
    if (userName) userName.textContent = `Hi, ${user.fullname.split(' ')[0]}`;
  } else {
    authButtons.style.display = 'flex';
    userMenu.style.display    = 'none';
  }
}

// ── LIKED SONGS ───────────────────────────────────────────────
async function loadLikedSongs() {
  const token = getToken();
  const container = document.getElementById('likedSongs');
  if (!token) { container.innerHTML = '<p class="empty-msg">Sign in to see your liked songs.</p>'; return; }

  const songs = await fetch(`${API}/api/liked`, { headers: { Authorization: `Bearer ${token}` } }).then(r => r.json()).catch(() => []);

  if (!songs.length) { container.innerHTML = '<p class="empty-msg">No liked songs yet. Like songs from the home page.</p>'; return; }

  window._likedPlaylist = songs;
  container.innerHTML = `
    <table class="song-table">
      <thead><tr><th>#</th><th>Title</th><th>Artist</th><th>Duration</th><th></th></tr></thead>
      <tbody>
        ${songs.map((s, i) => `
          <tr onclick="playSong(${i}, window._likedPlaylist)">
            <td>${i+1}</td>
            <td>
              <div style="display:flex;align-items:center;gap:10px;">
                <img src="${s.image}" style="width:40px;height:40px;border-radius:6px;object-fit:cover;" onerror="this.src='/images/logo_no_bg - Edited.png'">
                <span>${s.track_name}</span>
              </div>
            </td>
            <td style="color:#888">${s.artist_name}</td>
            <td style="color:#888">${s.duration ? Math.floor(s.duration/60)+':'+(s.duration%60).toString().padStart(2,'0') : '-'}</td>
            <td><button onclick="event.stopPropagation(); unlikeSong('${s.track_id}')" style="background:none;border:none;color:#f87171;cursor:pointer;"><i class="fa-solid fa-trash"></i></button></td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
}

async function unlikeSong(trackId) {
  const token = getToken();
  if (!token) return;
  await fetch(`${API}/api/liked/${trackId}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
  loadLikedSongs();
}

// ── PLAYLISTS ─────────────────────────────────────────────────
async function loadPlaylists() {
  const token = getToken();
  const grid  = document.getElementById('playlistsGrid');
  const side  = document.getElementById('sidebarPlaylists');
  if (!token) { grid.innerHTML = '<p class="empty-msg">Sign in to manage playlists.</p>'; return; }

  const playlists = await fetch(`${API}/api/playlists`, { headers: { Authorization: `Bearer ${token}` } }).then(r => r.json()).catch(() => []);

  side.innerHTML = playlists.map(p => `
    <div class="sidebar-pl-item" onclick="viewPlaylist(${p.id}, '${p.name.replace(/'/g,"\\'")}')">
      <i class="fa-solid fa-music"></i> ${p.name}
    </div>`).join('');

  if (!playlists.length) { grid.innerHTML = '<p class="empty-msg">No playlists yet. Create one!</p>'; return; }

  grid.innerHTML = playlists.map(p => `
    <div class="playlist-card" onclick="viewPlaylist(${p.id}, '${p.name.replace(/'/g,"\\'")}')">
      <i class="fa-solid fa-music" style="font-size:32px;margin-bottom:10px;"></i>
      <h4>${p.name}</h4>
      <button onclick="event.stopPropagation(); deletePlaylist(${p.id})" class="delete-pl-btn" title="Delete playlist">
        <i class="fa-solid fa-trash"></i>
      </button>
    </div>
  `).join('');
}

async function createPlaylist() {
  const token = getToken();
  if (!token) { alert('Please sign in first'); return; }
  const name = prompt('Playlist name:');
  if (!name) return;
  await fetch(`${API}/api/playlists`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name })
  });
  loadPlaylists();
}

async function deletePlaylist(id) {
  const token = getToken();
  if (!token) return;
  if (!confirm('Delete this playlist?')) return;
  await fetch(`${API}/api/playlists/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
  loadPlaylists();
}

async function viewPlaylist(id, name) {
  const token = getToken();
  if (!token) return;
  const songs = await fetch(`${API}/api/playlists/${id}/songs`, { headers: { Authorization: `Bearer ${token}` } }).then(r => r.json()).catch(() => []);
  const container = document.getElementById('likedSongs');
  window._viewPlaylist = songs;

  if (!songs.length) {
    container.innerHTML = `<h3 style="margin-bottom:16px">${name}</h3><p class="empty-msg">This playlist is empty.</p>`;
    return;
  }

  container.innerHTML = `
    <h3 style="margin-bottom:16px">${name}</h3>
    <table class="song-table">
      <thead><tr><th>#</th><th>Title</th><th>Artist</th><th>Duration</th><th></th></tr></thead>
      <tbody>
        ${songs.map((s, i) => `
          <tr onclick="playSong(${i}, window._viewPlaylist)">
            <td>${i+1}</td>
            <td>
              <div style="display:flex;align-items:center;gap:10px;">
                <img src="${s.image}" style="width:40px;height:40px;border-radius:6px;object-fit:cover;" onerror="this.src='/images/logo_no_bg - Edited.png'">
                <span>${s.track_name}</span>
              </div>
            </td>
            <td style="color:#888">${s.artist_name}</td>
            <td style="color:#888">${s.duration ? Math.floor(s.duration/60)+':'+(s.duration%60).toString().padStart(2,'0') : '-'}</td>
            <td><button onclick="event.stopPropagation(); removeFromPlaylist(${id}, '${s.track_id}')" style="background:none;border:none;color:#f87171;cursor:pointer;" title="Remove"><i class="fa-solid fa-minus"></i></button></td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
}

async function removeFromPlaylist(playlistId, trackId) {
  const token = getToken();
  if (!token) return;
  await fetch(`${API}/api/playlists/${playlistId}/songs/${trackId}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
  loadPlaylists();
}

function handleSearch(e) {
  if (e.key === 'Enter') {
    const val = document.getElementById('searchInput').value.trim();
    if (val) window.location.href = `/html/search.html?q=${encodeURIComponent(val)}`;
  }
}

// ── INIT ──────────────────────────────────────────────────────
updateAuthUI();
initPlayer();
loadLikedSongs();
loadPlaylists();
</script>
</body>
</html>
