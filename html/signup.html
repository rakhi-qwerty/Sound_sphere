<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up – SoundSphere</title>
  <link rel="stylesheet" href="/css/signup.css">
</head>
<body>

<div class="top">
  Already have an account? <a href="/html/signin.html">Sign in</a>
</div>

<div class="container">
  <h1>Create Account</h1>
  <p>Join SoundSphere and start your musical journey.</p>

  <div id="errorMsg" class="msg error-msg" style="display:none;"></div>
  <div id="successMsg" class="msg success-msg" style="display:none;"></div>

  <div class="input-box">
    <label>Full Name</label>
    <input type="text" id="fullname" placeholder="Your full name">
  </div>

  <div class="input-box">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="your@email.com">
  </div>

  <div class="input-box">
    <label>Password</label>
    <input type="password" id="password" placeholder="Min 6 characters">
  </div>

  <div class="input-box">
    <label>Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Repeat password">
  </div>

  <button id="signupBtn">Create Account →</button>

  <p style="text-align:center; margin-top:15px; color:#9ca3af; font-size:13px;">
    <a href="/" style="color:#3b82f6; text-decoration:none;">← Back to Home</a>
  </p>
</div>

<script>
  const API = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';

  document.getElementById('signupBtn').addEventListener('click', async () => {
    const fullname        = document.getElementById('fullname').value.trim();
    const email           = document.getElementById('email').value.trim();
    const password        = document.getElementById('password').value.trim();
    const confirmPassword = document.getElementById('confirmPassword').value.trim();
    const errDiv          = document.getElementById('errorMsg');
    const okDiv           = document.getElementById('successMsg');
    const btn             = document.getElementById('signupBtn');

    errDiv.style.display = 'none';
    okDiv.style.display  = 'none';

    if (!fullname || !email || !password || !confirmPassword) {
      errDiv.textContent = 'Please fill all fields.';
      errDiv.style.display = 'block';
      return;
    }

    if (password.length < 6) {
      errDiv.textContent = 'Password must be at least 6 characters.';
      errDiv.style.display = 'block';
      return;
    }

    if (password !== confirmPassword) {
      errDiv.textContent = 'Passwords do not match.';
      errDiv.style.display = 'block';
      return;
    }

    btn.textContent = 'Creating account...';
    btn.disabled = true;

    try {
      const res  = await fetch(`${API}/api/auth/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fullname, email, password })
      });
      const data = await res.json();

      if (!res.ok) {
        errDiv.textContent = data.error || 'Signup failed.';
        errDiv.style.display = 'block';
        btn.textContent = 'Create Account →';
        btn.disabled = false;
        return;
      }

      localStorage.setItem('ss_token', data.token);
      localStorage.setItem('ss_user', JSON.stringify(data.user));

      okDiv.textContent = `Welcome, ${data.user.fullname}! Redirecting...`;
      okDiv.style.display = 'block';

      setTimeout(() => window.location.href = '/', 1200);
    } catch {
      errDiv.textContent = 'Cannot connect to server. Make sure backend is running on port 3000.';
      errDiv.style.display = 'block';
      btn.textContent = 'Create Account →';
      btn.disabled = false;
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('signupBtn').click();
  });
</script>
</body>
</html>
